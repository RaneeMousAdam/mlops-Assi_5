name: Smart ML Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feature/**
  pull_request:
  workflow_dispatch:

jobs:

  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Linter
        run: |
          echo "Checking code formatting..."
          pip install --upgrade pip
          pip install flake8
          flake8 .

  train:
    runs-on: ubuntu-latest
    needs: linter

    if: >
      github.ref == 'refs/heads/main' &&
      needs.linter.result == 'success' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data with DVC
        run: dvc pull || true

      - name: Train model
        run: python train.py

      - name: Upload error logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup (always)
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

  deploy:
    runs-on: ubuntu-latest
    needs: train

    if: needs.train.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Mock Deploy
        run: echo "Deploying model..."